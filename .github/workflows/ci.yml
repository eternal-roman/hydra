name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  engine-tests:
    name: Engine Tests (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        # bcrypt<4.0 — passlib 1.7.4 reads bcrypt.__about__ which was removed in
        # bcrypt 4.x, triggering AttributeError + fallback-path truncation errors
        # during hydra_auth init_db() on import. Pin until passlib ships a 1.7.5
        # (or we migrate off passlib).
        run: pip install -r requirements.txt

      - name: Run engine test suite
        run: python tests/test_engine.py

      - name: Run cross-pair coordinator tests
        run: python tests/test_cross_pair.py

      - name: Run order book analyzer tests
        run: python tests/test_order_book.py

      - name: Run self-tuning parameter tests
        run: python tests/test_tuner.py

      - name: Run balance and asset conversion tests
        run: python tests/test_balance.py

      - name: Run Kraken CLI wrapper tests
        run: python tests/test_kraken_cli.py

      - name: Run ExecutionStream health & restart tests
        run: python tests/test_execution_stream.py

      - name: Run status gate tests
        run: python tests/test_status_gate.py

      - name: Run pair constants tests
        run: python tests/test_pair_constants.py

      - name: Run reconciliation tests
        run: python tests/test_reconciliation.py

      - name: Run resume reconciliation tests
        run: python tests/test_resume_reconcile.py

      - name: Run CandleStream tests
        run: python tests/test_candle_stream.py

      - name: Run TickerStream tests
        run: python tests/test_ticker_stream.py

      - name: Run BalanceStream tests
        run: python tests/test_balance_stream.py

      - name: Run BookStream tests
        run: python tests/test_book_stream.py

      - name: Run partial-fill reconciliation tests (HF-005)
        run: python tests/test_partial_fill_reconcile.py

      - name: Run portfolio covariance tests
        run: python tests/test_covariance.py

      - name: Run companion mode-label scrub tests (prevent internal labels leaking to users)
        run: python tests/test_companion_mode_scrub.py

      - name: Run backtest engine tests
        run: python -m pytest tests/test_backtest_engine.py -v

      - name: Run backtest drift regression (invariant I7)
        run: python -m pytest tests/test_backtest_drift.py -v

      - name: Run backtest metrics tests
        run: python -m pytest tests/test_backtest_metrics.py -v

      - name: Run backtest server tests
        run: python -m pytest tests/test_backtest_server.py -v

      - name: Run backtest tool-use dispatcher tests
        run: python -m pytest tests/test_backtest_tool.py -v

      - name: Run brain tool-use tests
        run: python -m pytest tests/test_brain_tool_use.py -v

      - name: Run derivatives stream tests (v2.14)
        run: python -m pytest tests/test_derivatives_stream.py -v

      - name: Run engine CVD divergence tests (v2.14)
        run: python -m pytest tests/test_engine_cvd.py -v

      - name: Run quant rules R1-R10 tests (v2.14)
        run: python -m pytest tests/test_quant_rules.py -v

      - name: Run experiment store tests
        run: python -m pytest tests/test_experiments.py -v

      - name: Run companion compiler tests
        run: python -m pytest tests/test_companion_compiler.py -v

      - name: Run companion compiler error-path tests
        run: python -m pytest tests/test_companion_compiler_errors.py -v

      - name: Run journal migrator error-path tests
        run: python -m pytest tests/test_journal_migrator_errors.py -v

      - name: Run companion router tests
        run: python -m pytest tests/test_companion_router.py -v

      - name: Run companion intent classifier tests
        run: python -m pytest tests/test_companion_classifier.py -v

      - name: Run companion memory tests
        run: python -m pytest tests/test_companion_memory.py -v

      - name: Run companion proposal tests
        run: python -m pytest tests/test_companion_proposals.py -v

      - name: Run companion live executor tests
        run: python -m pytest tests/test_companion_live_executor.py -v

      - name: Run companion ladder watcher tests
        run: python -m pytest tests/test_companion_ladder_watcher.py -v

      - name: Run companion nudge scheduler tests
        run: python -m pytest tests/test_companion_nudges.py -v

      - name: Run companion rollover tests
        run: python -m pytest tests/test_companion_rollover.py -v

      - name: Run companion clear-transcript tests
        run: python -m pytest tests/test_companion_clear_transcript.py -v

      - name: Run companion read-only tools tests
        run: python -m pytest tests/test_companion_tools_readonly.py -v

      - name: Run live-execution default-off contract tests (v2.25.3)
        run: python -m pytest tests/test_live_execution_default_off.py -v

      - name: Run Kraken REST-floor spacing tests (v2.25.3)
        run: python -m pytest tests/test_rest_floor_spacing.py -v

      - name: Run apex tools tests
        run: python -m pytest tests/test_apex_tools.py -v

      - name: Run v2.20 research tab tests (history store + walk-forward + tape + sqlite)
        run: python -m pytest tests/test_history_store.py tests/test_history_store_migrations.py tests/test_walk_forward.py tests/test_walk_forward_folds.py tests/test_wilcoxon.py tests/test_tape_capture.py tests/test_candle_stream_callback.py tests/test_backtest_sqlite_source.py tests/test_research_ws.py tests/test_research_params_current.py tests/test_bootstrap_history.py tests/test_refresh_history.py -v

      - name: Run agent/config/registry/auth tests (v2.26.2 — closes CI collection gap)
        run: python -m pytest tests/test_agent_balance_history.py tests/test_agent_journal_persistence.py tests/test_agent_rm_features_wiring.py tests/test_agent_snapshot_migration_integration.py tests/test_auth.py tests/test_brain_rm_features_prompt.py tests/test_brain_tax_friction.py tests/test_buy_limit_offset.py tests/test_config.py tests/test_pair_registry.py tests/test_rm_features.py tests/test_state_migrator.py tests/test_ws_token_files.py -v

      - name: Run Wilder smoothing reference tests (v2.26.2)
        run: python -m pytest tests/test_wilder_reference.py -v

      - name: Run flywheel + friction/fee-true tests (v2.27)
        run: python -m pytest tests/test_flywheel.py tests/test_friction_fee.py tests/test_demo_mode.py -v

      - name: Run trading-mechanics remediation tests (PR-A…F exit/caps/true-up/Kelly/quant/warmup)
        run: |
          python -m pytest \
            tests/test_exit_guarantees.py \
            tests/test_position_caps.py \
            tests/test_fill_trueup.py \
            tests/test_kelly_edge.py \
            tests/test_warmup_unified.py \
            tests/test_pr_e_quant_crosspair.py \
            tests/test_remediation_loose_ends.py \
            tests/test_regime_selective.py \
            -v

      - name: Run go-live plumbing gates (sqlite required; skip if absent)
        run: |
          if [ -f hydra_history.sqlite ]; then
            python scripts/go_live_gates.py
          else
            echo "hydra_history.sqlite not present — skipping go_live_gates"
          fi

      - name: Run live-execution harness (smoke + mock)
        run: |
          python tests/live_harness/harness.py --mode smoke
          python tests/live_harness/harness.py --mode mock

      - name: Run engine synthetic demo
        run: python hydra_engine.py

      - name: Verify all modules import cleanly
        run: |
          python -c "import hydra_engine; print('hydra_engine OK')"
          python -c "import hydra_tuner; print('hydra_tuner OK')"
          python -c "import hydra_brain; print('hydra_brain OK')"
          python -c "import hydra_derivatives_stream; print('hydra_derivatives_stream OK')"
          python -c "import hydra_quant_rules; print('hydra_quant_rules OK')"
          python -c "import hydra_agent; print('hydra_agent OK')"
          python -c "import hydra_flywheel; print('hydra_flywheel OK')"

  dashboard-build:
    name: Dashboard Build (Node)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: dashboard
        run: npm install

      - name: Build dashboard
        working-directory: dashboard
        run: npm run build

      - name: Verify build output exists
        working-directory: dashboard
        run: |
          test -f dist/index.html
          echo "Dashboard build verified"
